name: Full CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: asymmetric-effort/actions/actions/setup-bun@3c23e426e613d2cff03648db1522d92b9f5dc470 # main
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint

  # ── Stage 2: Build ────────────────────────────────────────────────
  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: asymmetric-effort/actions/actions/setup-bun@3c23e426e613d2cff03648db1522d92b9f5dc470 # main
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Stage 3: Test (matrix, after build) ───────────────────────────
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: asymmetric-effort/actions/actions/setup-bun@3c23e426e613d2cff03648db1522d92b9f5dc470 # main
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install --frozen-lockfile
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Run tests with coverage
        run: bun run test
      - name: Upload coverage
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Stage 3b: Benchmarks (parallel with test, non-blocking) ──────
  benchmark:
    name: Benchmarks
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: asymmetric-effort/actions/actions/setup-bun@3c23e426e613d2cff03648db1522d92b9f5dc470 # main
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Run benchmarks
        run: bun test benchmarks/

  # ── Stage 4: Dist Validation ─────────────────────────────────────
  dist-validation:
    name: Dist Validation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Verify build output is importable
        run: |
          node -e "
            const m = require('./dist/index.js');
            const keys = Object.keys(m);
            console.log('Exports:', keys.length, 'symbols');
            console.log('Key exports:', keys.slice(0, 10).join(', '));
            const required = ['rollup', 'watch', 'parseAst', 'defineConfig', 'VERSION', 'build', 'minify'];
            for (const fn of required) {
              if (!keys.includes(fn)) { console.error('Missing export:', fn); process.exit(1); }
            }
            console.log('All required exports present');
          "
      - name: Verify CLI is executable
        run: node dist/cli/main.js --version
      - name: Verify secondary entry points
        run: |
          node -e "const m = require('./dist/parse-ast.js'); console.log('parse-ast exports:', Object.keys(m).length)"
          node -e "const m = require('./dist/sourcemap.js'); console.log('sourcemap exports:', Object.keys(m).length)"

  # ── Stage 5: Bundle Size Budget ──────────────────────────────────
  bundle-size:
    name: Bundle Size Budget
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Check bundle size
        run: |
          TOTAL=$(du -sb dist/ | cut -f1)
          echo "Total dist size: $((TOTAL / 1024)) KB"
          gzip -k dist/index.js
          GZIP_SIZE=$(wc -c < dist/index.js.gz)
          echo "index.js gzipped: $((GZIP_SIZE / 1024)) KB ($GZIP_SIZE bytes)"
          rm dist/index.js.gz
          if [ "$TOTAL" -gt 5242880 ]; then
            echo "ERROR: Total dist size $((TOTAL / 1024)) KB exceeds 5MB budget"
            exit 1
          fi
          if [ "$GZIP_SIZE" -gt 524288 ]; then
            echo "ERROR: index.js gzipped $((GZIP_SIZE / 1024)) KB exceeds 512KB budget"
            exit 1
          fi
          echo "Bundle size within budget"

  # ── Stage 6: Build Site (main push only, not PRs or tags) ────────
  build-site:
    name: Build Website
    needs: [test, dist-validation]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: asymmetric-effort/actions/actions/setup-bun@3c23e426e613d2cff03648db1522d92b9f5dc470 # main
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install website dependencies
        run: cd website && npm ci
      - name: Build website
        run: cd website && npm run build
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v5
      - name: Upload pages artifact
        uses: asymmetric-effort/actions/actions/upload-pages-artifact@940ebd094488ead7765982278cfda3653fdbce48 # main
        with:
          path: website/dist

  # ── Stage 7: Deploy Site ─────────────────────────────────────────
  deploy-site:
    name: Deploy to GitHub Pages
    needs: build-site
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: asymmetric-effort/actions/actions/deploy-pages@940ebd094488ead7765982278cfda3653fdbce48 # main

  # ── Stage 8: Post-Deployment Verification (Playwright) ───────────
  verify-deployment:
    name: Post-Deployment Verification
    needs: deploy-site
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install website dependencies
        working-directory: website
        run: npm ci
      - name: Install Playwright browsers
        working-directory: website
        run: npx playwright install --with-deps chromium
      - name: Wait for deployment to propagate
        run: sleep 45
      - name: Run Playwright PDV tests
        working-directory: website
        run: npx playwright test
      - name: Upload PDV report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pdv-report
          path: website/playwright-report/
          retention-days: 7

  # ── Stage 9: Nightly Extended Tests (schedule only) ──────────────
  nightly:
    name: Nightly Extended Tests
    if: github.event_name == 'schedule'
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: asymmetric-effort/actions/actions/setup-bun@3c23e426e613d2cff03648db1522d92b9f5dc470 # main
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Run compatibility tests
        run: bun test tests/compat/
      - name: Run differential tests
        run: bun test tests/compat/differential.test.ts

  # ── Stage 10: Publish to npm (tags only, after all validation) ───
  # Requires test, dist-validation, bundle-size, and benchmarks to pass.
  # PDV (verify-deployment) runs on main pushes, not tag pushes — tags
  # should only be created after the main pipeline is fully green.
  publish:
    name: Publish to npm
    needs: [test, dist-validation, bundle-size, benchmark]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.test.result == 'success' &&
      needs.dist-validation.result == 'success' &&
      needs.bundle-size.result == 'success' &&
      !contains(needs.benchmark.result, 'failure')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: asymmetric-effort/actions/actions/checkout@940ebd094488ead7765982278cfda3653fdbce48 # main
      - uses: asymmetric-effort/actions/actions/setup-bun@3c23e426e613d2cff03648db1522d92b9f5dc470 # main
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          [ "$TAG" = "$PKG" ] || (echo "ERROR: Tag v$TAG != package.json $PKG" && exit 1)
          SRC=$(node -p "require('./dist/version.js').VERSION")
          [ "$TAG" = "$SRC" ] || (echo "ERROR: Tag v$TAG != src/version.ts $SRC" && exit 1)
          echo "Version verified: $PKG"
      - name: Publish to npm
        uses: asymmetric-effort/actions/actions/npm-publish@940ebd094488ead7765982278cfda3653fdbce48 # main
        with:
          access: public
          provenance: "true"
      - name: Verify npm publish
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Waiting for npm registry to reflect v$TAG..."
          for i in $(seq 1 12); do
            LATEST=$(npm view @asymmetric-effort/steamroller version 2>/dev/null || echo "")
            if [ "$LATEST" = "$TAG" ]; then
              echo "Verified: @asymmetric-effort/steamroller@$TAG is live on npm"
              exit 0
            fi
            echo "Attempt $i/12: latest=$LATEST, expected=$TAG"
            sleep 10
          done
          echo "WARNING: npm may still be propagating"
